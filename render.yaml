services:
  - type: web
    name: vennela-ai
    runtime: python
    plan: free
    buildCommand: rm -rf .pip-cache && pip install --no-cache-dir -r requirements-lightweight.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      # Lightweight mode
      - key: LIGHTWEIGHT_MODE
        value: "true"
      
      # Python Configuration
      - key: PYTHON_VERSION
        value: 3.11.9
      
      # Gemini API (Primary LLM - Phase A)
      - key: GEMINI_API_KEY
        sync: false
      
      # Gemini Models (Phase 1: Intelligent LLM Router)
      - key: GEMINI_3_1_FLASH_LITE_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_2_5_FLASH_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_LIVE_MODEL
        value: gemini-2.0-flash-exp
      - key: GEMINI_MODEL_LITE_TEMPERATURE
        value: "0.7"
      - key: GEMINI_MODEL_STANDARD_TEMPERATURE
        value: "0.9"
      - key: GEMINI_MODEL_MAX_TOKENS
        value: "2000"
      
      # Groq API (Fallback Provider - Phase A)
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FALLBACK_MODEL
        value: llama-3.1-8b-instant
      
      # OpenRouter API (Final Fallback - Phase A)
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      
      # LLM Router Configuration (Phase A)
      - key: LLM_ROUTER_ENABLED
        value: "true"
      - key: MODEL_SELECTOR_ENABLED
        value: "true"
      - key: COST_TRACKING_ENABLED
        value: "true"
      - key: HEALTH_CHECK_INTERVAL_SECONDS
        value: "300"
      - key: LATENCY_BUDGET_MS
        value: "2000"
      
      # Event Bus Configuration (Phase B)
      - key: EVENT_BUS_ENABLED
        value: "true"
      - key: EVENT_HISTORY_MAX_SIZE
        value: "1000"
      - key: EVENT_QUEUE_MAX_SIZE
        value: "10000"
      
      # Memory Reflection Configuration (Phase C)
      - key: MEMORY_REFLECTION_ENABLED
        value: "true"
      - key: CONSOLIDATION_INTERVAL_MINUTES
        value: "5"
      - key: IMPORTANCE_THRESHOLD
        value: "0.3"
      
      # Voice Pipeline Configuration (Phase 1: with Live API)
      - key: VOICE_PIPELINE_ENABLED
        value: "true"
      - key: VOICE_MODEL
        value: gemini-live-3.1-flash
      - key: WAKEWORD_DETECTION_ENABLED
        value: "true"
      - key: WAKEWORD_MODEL
        value: openwakeword
      - key: WAKEWORD_THRESHOLD
        value: "0.85"
      - key: AUDIO_BUFFER_SIZE
        value: "100"
      - key: AUDIO_SAMPLE_RATE
        value: "16000"
      
      # Autonomous Learning Configuration (Phase E)
      - key: LEARNING_LOOP_ENABLED
        value: "true"
      - key: REINFORCEMENT_ENABLED
        value: "true"
      - key: FEEDBACK_COLLECTION_ENABLED
        value: "true"
      
      # Adaptive Personality Configuration (Phase F)
      - key: PERSONALITY_ADAPTATION_ENABLED
        value: "true"
      - key: MOOD_DETECTION_ENABLED
        value: "true"
      - key: EMOTION_IN_VOICE
        value: "true"
      
      # Predictive Intent Configuration (Phase G)
      - key: INTENT_PREDICTION_ENABLED
        value: "true"
      - key: PATTERN_DETECTION_ENABLED
        value: "true"
      - key: CONTEXT_PREDICTION_ENABLED
        value: "true"
      
      # Firebase Configuration (Optional)
      - key: FIREBASE_ENABLED
        value: "false"
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_TYPE
        value: service_account
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_CLIENT_ID
        sync: false
      - key: FIREBASE_AUTH_URI
        value: https://accounts.google.com/o/oauth2/auth
      - key: FIREBASE_TOKEN_URI
        value: https://oauth2.googleapis.com/token
      - key: FIREBASE_AUTH_PROVIDER_X509_CERT_URL
        value: https://www.googleapis.com/oauth2/v1/certs
      - key: FIREBASE_CLIENT_X509_CERT_URL
        sync: false
      - key: FIREBASE_UNIVERSE_DOMAIN
        value: googleapis.com
      
      # Application Configuration
      - key: VENNELA_PROMPT
        sync: false
      - key: RECENT_CHAT_LIMIT
        value: "20"
      - key: MAX_MESSAGE_LENGTH
        value: "5000"
      - key: RATE_LIMIT_REQUESTS
        value: "100"
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: "1"
      
      # Cache Configuration
      - key: HF_HOME
        value: /opt/render/project/src/.hf_cache
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /opt/render/project/src/.hf_cache/sentence-transformers
      - key: HF_HUB_DISABLE_SYMLINKS_WARNING
        value: "1"
      
      # Logging Configuration
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG_MODE
        value: "false"
