services:
  - type: web
    name: vennela-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: VENNELA_PROMPT
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS
        value: vennela-firebase-key.json
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: RECENT_CHAT_LIMIT
        value: "20"
      - key: MAX_MESSAGE_LENGTH
        value: "5000"
      - key: RATE_LIMIT_REQUESTS
        value: "100"
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: "1"
      - key: HF_HOME
        value: /opt/render/project/src/.hf_cache
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /opt/render/project/src/.hf_cache/sentence-transformers
      - key: HF_HUB_DISABLE_SYMLINKS_WARNING
        value: "1"
